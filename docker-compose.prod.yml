version: '3.8'

services:
  client:
    build:
      context: ./client
      dockerfile: DockerFile
      args:
        - VITE_API_BASE_URL=https://api.skyopenaccesspublishers.com/api
    container_name: skyopenaccess_client_prod
    restart: always
    expose:
      - "80"

  server:
    build:
      context: ./server
      dockerfile: DockerFile
    container_name: skyopenaccess_server_prod
    restart: always
    expose:
      - "5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CLIENT_ORIGIN=https://skyopenaccesspublishers.com
    volumes:
      # Persistent named volume for production logs
      - server_logs:/app/logs

  nginx:
    image: nginx:alpine
    container_name: skyopenaccess_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_challenge:/var/www/certbot:ro
    depends_on:
      - client
      - server

volumes:
  server_logs:
  certbot_challenge:
